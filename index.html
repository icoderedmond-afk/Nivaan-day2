<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastermind Cricket Trivia (100-Question Vault)</title>
    <style>
        :root {
            --primary: #1b4332;
            --primary-light: #2d6a4f;
            --accent: #d8f3dc;
            --correct: #2a9d8f;
            --incorrect: #e76f51;
            --bg: #f4f7f5;
            --card-bg: #ffffff;
            --text: #212529;
            --text-muted: #6c757d;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-image: radial-gradient(#1b4332 0.75px, transparent 0.75px);
            background-size: 24px 24px;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, #081c15, #1b4332);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        header p {
            color: #b7e4c7;
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            width: 100%;
            max-width: 680px;
            padding: 1.5rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary-light);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #40916c, #52b788);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            color: var(--text);
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary-light);
            background: #f1f8f5;
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--correct) !important;
            color: #155724 !important;
            font-weight: 700;
        }

        .option-btn.incorrect {
            background-color: #f8d7da !important;
            border-color: var(--incorrect) !important;
            color: #721c24 !important;
        }

        .explanation-box {
            background: #eef7f2;
            border-left: 4px solid var(--primary-light);
            padding: 1rem 1.25rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .results-screen {
            text-align: center;
        }

        .score-badge {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #d8f3dc;
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            border: 4px solid var(--primary);
            font-size: 2rem;
            font-weight: 800;
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏏 Mastermind Cricket Trivia</h1>
        <p>100 Expert-Level Questions on Cricket History, Records & Statistics</p>
    </header>

    <main>
        <div id="welcome-screen" class="card">
            <h2 style="color: var(--primary); margin-bottom: 1rem; text-align: center;">Player Registration</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; text-align: center;">Enter your name and age to begin the challenge.</p>
            
            <form id="player-form">
                <div class="input-group">
                    <label for="player-name">Full Name</label>
                    <input type="text" id="player-name" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label for="player-age">Age</label>
                    <input type="number" id="player-age" placeholder="Enter your age" min="5" max="120" required>
                </div>

                <button type="submit" class="btn">Start Quiz Challenge 🚀</button>
            </form>
        </div>

        <div id="quiz-screen" class="card" style="display: none;">
            <div class="quiz-header">
                <span id="player-display">Player: -</span>
                <span id="question-tracker">Question 1/10</span>
                <span id="score-tracker">Score: 0</span>
            </div>

            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <h3 id="question-text" class="question-title">Loading...</h3>
            <div id="options-container" class="options-container"></div>
            <div id="explanation-box" class="explanation-box"></div>

            <button id="next-btn" class="btn" style="display: none;">Next Question ➔</button>
        </div>

        <div id="result-screen" class="card results-screen" style="display: none;">
            <div class="score-badge" id="final-score">0/10</div>
            <h2 id="result-user-title" style="color: var(--primary); margin-bottom: 0.5rem;">Completed!</h2>
            <p id="performance-desc" style="color: var(--text-muted); margin-bottom: 1.5rem;"></p>

            <button id="restart-btn" class="btn">Play Again (Random 10 Questions) 🔄</button>
        </div>
    </main>

    <footer>
        <p>Mastermind Cricket Trivia &copy; Interactive Local Quiz Application</p>
    </footer>

        ];

        // State Setup
        const QUESTIONS_PER_SESSION = 10;
        let activeQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let playerProfile = { name: "", age: "" };

        // DOM Elements
        const welcomeScreen = document.getElementById('welcome-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const playerForm = document.getElementById('player-form');
        const playerNameInput = document.getElementById('player-name');
        const playerAgeInput = document.getElementById('player-age');
        const playerDisplay = document.getElementById('player-display');
        
        const questionTracker = document.getElementById('question-tracker');
        const scoreTracker = document.getElementById('score-tracker');
        const progressBar = document.getElementById('progress-bar');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const explanationBox = document.getElementById('explanation-box');
        const nextBtn = document.getElementById('next-btn');

        // Fisher-Yates Randomization
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Form Submit
        playerForm.onsubmit = (e) => {
            e.preventDefault();
            playerProfile.name = playerNameInput.value.trim();
            playerProfile.age = playerAgeInput.value;

            playerDisplay.textContent = `${playerProfile.name} (${playerProfile.age}y)`;
            startQuiz();
        };

        function startQuiz() {
            activeQuestions = shuffleArray(masterQuestionBank).slice(0, QUESTIONS_PER_SESSION);
            currentIndex = 0;
            score = 0;

            welcomeScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            quizScreen.style.display = 'block';

            loadQuestion();
        }

        function loadQuestion() {
            explanationBox.style.display = 'none';
            nextBtn.style.display = 'none';

            const q = activeQuestions[currentIndex];

            questionTracker.textContent = `Question ${currentIndex + 1}/${activeQuestions.length}`;
            scoreTracker.textContent = `Score: ${score}`;
            progressBar.style.width = `${(currentIndex / activeQuestions.length) * 100}%`;

            questionText.textContent = q.question;
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(idx);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIdx) {
            const q = activeQuestions[currentIndex];
            const buttons = optionsContainer.children;

            if (selectedIdx === q.answer) {
                score++;
                buttons[selectedIdx].classList.add('correct');
            } else {
                buttons[selectedIdx].classList.add('incorrect');
                buttons[q.answer].classList.add('correct');
            }

            Array.from(buttons).forEach(btn => btn.disabled = true);

            explanationBox.textContent = q.explanation;
            explanationBox.style.display = 'block';
            nextBtn.style.display = 'block';
            scoreTracker.textContent = `Score: ${score}`;
        }

        nextBtn.onclick = () => {
            currentIndex++;
            if (currentIndex < activeQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';

            document.getElementById('final-score').textContent = `${score}/${activeQuestions.length}`;
            document.getElementById('result-user-title').textContent = `Challenge Complete, ${playerProfile.name}!`;
            document.getElementById('performance-desc').textContent = 
                `Player: ${playerProfile.name} (Age ${playerProfile.age}) | Correct Answers: ${score} / ${activeQuestions.length}`;
        }

        document.getElementById('restart-btn').onclick = startQuiz;
    </script>
